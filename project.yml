name: PETROiD
options:
  bundleIdPrefix: com.petrovicatos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""

targets:
  PETROiD:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PETROiD
    resources:
      - path: PETROiD/Assets.xcassets
    info:
      path: PETROiD/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: PETROiD
        NSCameraUsageDescription: "PETROiD uses the camera to photograph and identify rocks."
        NSPhotoLibraryUsageDescription: "PETROiD reads photos to identify rocks."
        NFCReaderUsageDescription: "PETROiD uses NFC to battle nearby trainers."
        NSLocationWhenInUseUsageDescription: "PETROiD pins where you found each rock."
    entitlements:
      path: PETROiD/PETROiD.entitlements
      properties:
        com.apple.developer.nfc.readersession.formats:
          - NDEF
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.petrovicatos.PETROiD
